spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/PrepForge}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Noah2511}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  kafka:
    listener:
      auto-startup: false   # 🔥 THIS disables Kafka

app:
  jwt:
    secret: ${JWT_SECRET:ThisIsASuperLongJwtSecretKeyThatIsAtLeast32CharactersLong123}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  redis:
    enabled: ${REDIS_ENABLED:true}
  timer-state:
    key-prefix: ${TIMER_STATE_KEY_PREFIX:prepforge:timed-session}
    ttl-grace-seconds: ${TIMER_STATE_TTL_GRACE_SECONDS:30}

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  model: ${OPENAI_MODEL:gpt-5-mini}
