spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/PrepForge}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Noah2511}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  kafka:
    listener:
      auto-startup: false   # 🔥 THIS disables Kafka

app:
  jwt:
    secret: ${JWT_SECRET:ThisIsASuperLongJwtSecretKeyThatIsAtLeast32CharactersLong123}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  redis:
    enabled: ${REDIS_ENABLED:true}
  timer-state:
    key-prefix: ${TIMER_STATE_KEY_PREFIX:prepforge:timed-session}
    ttl-grace-seconds: ${TIMER_STATE_TTL_GRACE_SECONDS:30}
  analytics-cache:
    enabled: ${ANALYTICS_CACHE_ENABLED:true}
    key-prefix: ${ANALYTICS_CACHE_KEY_PREFIX:prepforge:analytics-cache}
    ttl-seconds: ${ANALYTICS_CACHE_TTL_SECONDS:120}
  jobs:
    default-max-attempts: ${ASYNC_JOB_DEFAULT_MAX_ATTEMPTS:3}
    retry-backoff-seconds: ${ASYNC_JOB_RETRY_BACKOFF_SECONDS:30}
    worker:
      enabled: ${ASYNC_JOB_WORKER_ENABLED:true}
      poll-delay-ms: ${ASYNC_JOB_WORKER_POLL_DELAY_MS:3000}
      max-jobs-per-poll: ${ASYNC_JOB_WORKER_MAX_JOBS_PER_POLL:3}
  rate-limit:
    ai:
      enabled: ${AI_RATE_LIMIT_ENABLED:true}
      fail-open-on-redis-error: ${AI_RATE_LIMIT_FAIL_OPEN_ON_REDIS_ERROR:true}
      key-prefix: ${AI_RATE_LIMIT_KEY_PREFIX:prepforge:rate-limit:ai}
      default-limit: ${AI_RATE_LIMIT_DEFAULT_LIMIT:10}
      default-window-seconds: ${AI_RATE_LIMIT_DEFAULT_WINDOW_SECONDS:60}
      categories:
        coding-feedback:
          limit: ${AI_RATE_LIMIT_CODING_FEEDBACK_LIMIT:6}
          window-seconds: ${AI_RATE_LIMIT_CODING_FEEDBACK_WINDOW_SECONDS:60}
        coding-improvement:
          limit: ${AI_RATE_LIMIT_CODING_IMPROVEMENT_LIMIT:4}
          window-seconds: ${AI_RATE_LIMIT_CODING_IMPROVEMENT_WINDOW_SECONDS:60}
        strategy-evaluation:
          limit: ${AI_RATE_LIMIT_STRATEGY_EVALUATION_LIMIT:6}
          window-seconds: ${AI_RATE_LIMIT_STRATEGY_EVALUATION_WINDOW_SECONDS:60}
        approach-comparison:
          limit: ${AI_RATE_LIMIT_APPROACH_COMPARISON_LIMIT:6}
          window-seconds: ${AI_RATE_LIMIT_APPROACH_COMPARISON_WINDOW_SECONDS:60}
        behavioral-feedback:
          limit: ${AI_RATE_LIMIT_BEHAVIORAL_FEEDBACK_LIMIT:6}
          window-seconds: ${AI_RATE_LIMIT_BEHAVIORAL_FEEDBACK_WINDOW_SECONDS:60}
        behavioral-improvement:
          limit: ${AI_RATE_LIMIT_BEHAVIORAL_IMPROVEMENT_LIMIT:4}
          window-seconds: ${AI_RATE_LIMIT_BEHAVIORAL_IMPROVEMENT_WINDOW_SECONDS:60}

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  model: ${OPENAI_MODEL:gpt-5-mini}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level requestId=%X{requestId:-} correlationId=%X{correlationId:-} jobId=%X{jobId:-} jobType=%X{jobType:-} aggregateType=%X{aggregateType:-} aggregateId=%X{aggregateId:-} logger=%logger{36} - %msg%n%wEx"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
